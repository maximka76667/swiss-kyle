name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.2.0 (a leading 'v' is stripped)"
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            rust-target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-15-intel # Intel
            rust-target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            rust-target: ""
            args: ""
          - platform: windows-latest
            rust-target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Single source of truth for the version: the workflow input, with any
      # leading 'v' stripped to valid semver. Patch it into tauri.conf.json (which
      # drives the bundle filenames) and Cargo.toml, and export it so the git tag
      # and release title below use the exact same string — files, tag, and name
      # all match. Runs on bash across every matrix OS (Git Bash on Windows);
      # Node is preinstalled on GitHub runners.
      - name: Apply release version
        id: version
        shell: bash
        env:
          RAW_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="${RAW_VERSION#v}"
          if [[ -z "$VERSION" ]]; then
            echo "::error::version input is empty" >&2
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+.].*)?$ ]]; then
            echo "::error::version '$VERSION' is not valid semver (expected e.g. 0.2.0)" >&2
            exit 1
          fi
          echo "Releasing $VERSION"
          VERSION="$VERSION" node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const conf = "src-tauri/tauri.conf.json";
            const c = JSON.parse(fs.readFileSync(conf, "utf8"));
            c.version = v;
            fs.writeFileSync(conf, JSON.stringify(c, null, 2) + "\n");
            const cargo = "src-tauri/Cargo.toml";
            const t = fs.readFileSync(cargo, "utf8").replace(/^version = ".*"/m, `version = "${v}"`);
            fs.writeFileSync(cargo, t);
            console.log("Patched tauri.conf.json and Cargo.toml to " + v);
          '
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf ffmpeg pandoc
          TRIPLE=$(rustc -vV | sed -n 's/host: //p' | tr -d '\r')
          mkdir -p src-tauri/binaries
          cp "$(which ffmpeg)" "src-tauri/binaries/ffmpeg-${TRIPLE}"
          cp "$(which pandoc)" "src-tauri/binaries/pandoc-${TRIPLE}"

      - name: Install macOS dependencies
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install ffmpeg pandoc typst nats-server
          TRIPLE=$(rustc -vV | sed -n 's/host: //p' | tr -d '\r')
          mkdir -p src-tauri/binaries
          cp "$(brew --prefix ffmpeg)/bin/ffmpeg" "src-tauri/binaries/ffmpeg-${TRIPLE}"
          cp "$(brew --prefix pandoc)/bin/pandoc" "src-tauri/binaries/pandoc-${TRIPLE}"
          cp "$(brew --prefix typst)/bin/typst" "src-tauri/binaries/typst-${TRIPLE}"
          cp "$(brew --prefix nats-server)/bin/nats-server" "src-tauri/binaries/nats-server-${TRIPLE}"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.version }}
          releaseName: "Swiss Kyle ${{ steps.version.outputs.version }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          tauriScript: bunx @tauri-apps/cli@^2
          args: ${{ matrix.args }}
