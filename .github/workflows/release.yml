name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0)'
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-13       # Intel
            rust-target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            rust-target: ''
            args: ''
          - platform: windows-latest
            rust-target: ''
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf ffmpeg
          TRIPLE=$(rustc -vV | sed -n 's/host: //p' | tr -d '\r')
          mkdir -p src-tauri/binaries
          cp "$(which ffmpeg)" "src-tauri/binaries/ffmpeg-${TRIPLE}"

      - name: Install macOS dependencies
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install ffmpeg
          TRIPLE=$(rustc -vV | sed -n 's/host: //p' | tr -d '\r')
          mkdir -p src-tauri/binaries
          cp "$(brew --prefix ffmpeg)/bin/ffmpeg" "src-tauri/binaries/ffmpeg-${TRIPLE}"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version }}
          releaseName: 'Swiss Kyle ${{ github.event.inputs.version }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          tauriScript: bunx @tauri-apps/cli@^2
          args: ${{ matrix.args }}
