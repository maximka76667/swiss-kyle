name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.2.0 (a leading 'v' is stripped)"
        required: true
        type: string

jobs:
  # Creates the draft release exactly once, before any matrix leg runs.
  # `gh release create --draft` does NOT dedupe the way a published release
  # does (drafts aren't tied to a real git tag), so calling it once per
  # matrix leg previously created 4 separate draft releases and only one
  # ended up with assets. Matrix legs now only ever upload to this one.
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Compute and validate version
        id: version
        shell: bash
        env:
          RAW_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="${RAW_VERSION#v}"
          if [[ -z "$VERSION" ]]; then
            echo "::error::version input is empty" >&2
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+.].*)?$ ]]; then
            echo "::error::version '$VERSION' is not valid semver (expected e.g. 0.2.0)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --repo "${{ github.repository }}" \
            --title "Swiss Kyle $VERSION" \
            --notes "See the assets below to download and install." \
            --draft

  release:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            rust-target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-15-intel # Intel
            rust-target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            rust-target: ""
            args: ""
          - platform: windows-latest
            rust-target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Version was already computed and validated once in create-release;
      # reuse it here (as the release title/tag) so every matrix leg agrees
      # on the exact same string. Patch it into tauri.conf.json (which drives
      # the bundle filenames) and Cargo.toml. Runs on bash across every
      # matrix OS (Git Bash on Windows); Node is preinstalled on GitHub runners.
      - name: Apply release version
        id: version
        shell: bash
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          echo "Releasing $VERSION"
          VERSION="$VERSION" node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const conf = "src-tauri/tauri.conf.json";
            const c = JSON.parse(fs.readFileSync(conf, "utf8"));
            c.version = v;
            fs.writeFileSync(conf, JSON.stringify(c, null, 2) + "\n");
            const cargo = "src-tauri/Cargo.toml";
            const t = fs.readFileSync(cargo, "utf8").replace(/^version = ".*"/m, `version = "${v}"`);
            fs.writeFileSync(cargo, t);
            console.log("Patched tauri.conf.json and Cargo.toml to " + v);
          '
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf ffmpeg pandoc
          TRIPLE=$(rustc -vV | sed -n 's/host: //p' | tr -d '\r')
          mkdir -p src-tauri/binaries
          cp "$(which ffmpeg)" "src-tauri/binaries/ffmpeg-${TRIPLE}"
          cp "$(which pandoc)" "src-tauri/binaries/pandoc-${TRIPLE}"

      # Verifies the ffmpeg/pandoc binaries just installed above actually
      # report the version prepare-sidecars.ts pins; if one doesn't match
      # (e.g. an OS repo shipping a stale package), this downloads the real
      # pinned build itself instead of trusting the package manager's copy.
      - name: Mark CI-provided sidecar versions (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          bun run scripts/mark-sidecar-version.ts ffmpeg
          bun run scripts/mark-sidecar-version.ts pandoc

      - name: Install macOS dependencies
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install ffmpeg pandoc typst nats-server
          TRIPLE=$(rustc -vV | sed -n 's/host: //p' | tr -d '\r')
          mkdir -p src-tauri/binaries
          cp "$(brew --prefix ffmpeg)/bin/ffmpeg" "src-tauri/binaries/ffmpeg-${TRIPLE}"
          cp "$(brew --prefix pandoc)/bin/pandoc" "src-tauri/binaries/pandoc-${TRIPLE}"
          cp "$(brew --prefix typst)/bin/typst" "src-tauri/binaries/typst-${TRIPLE}"
          cp "$(brew --prefix nats-server)/bin/nats-server" "src-tauri/binaries/nats-server-${TRIPLE}"

      # Verifies the binaries just installed above actually report the
      # version prepare-sidecars.ts pins; if one doesn't match (e.g. brew
      # having moved on to a newer release than the pin), this downloads the
      # real pinned build itself instead of trusting brew's copy.
      - name: Mark CI-provided sidecar versions (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          bun run scripts/mark-sidecar-version.ts ffmpeg
          bun run scripts/mark-sidecar-version.ts pandoc
          bun run scripts/mark-sidecar-version.ts typst
          bun run scripts/mark-sidecar-version.ts nats-server

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # No tagName/releaseId passed: per tauri-action's own logic, that means
      # build-only — it skips creating or uploading to a GitHub release
      # entirely ("No releaseId or tagName provided, skipping all
      # uploads..."). We upload ourselves below, once the Linux fix step
      # (which needs to run after the build but before anything is
      # published) has had a chance to run.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: bunx @tauri-apps/cli@^2
          args: ${{ matrix.args }}

      # linuxdeploy's GStreamer-bundling plugin corrupts the bundled typst
      # binary while patching AppDir binaries for portability (typst is
      # static-pie, a shape patchelf mishandles — see
      # scripts/fix-appimage-typst.ts for the full explanation). Must run
      # after the AppImage is built but before it's uploaded as a release
      # asset.
      - name: Fix AppImage typst sidecar
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: bun run scripts/fix-appimage-typst.ts

      - name: Collect bundle artifacts
        shell: bash
        env:
          RUST_TARGET: ${{ matrix.rust-target }}
        run: |
          BUNDLE_DIR="target/release/bundle"
          if [[ -n "$RUST_TARGET" ]]; then
            BUNDLE_DIR="target/$RUST_TARGET/release/bundle"
          fi
          mkdir -p release-assets
          find "$BUNDLE_DIR" -maxdepth 2 -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.exe' \) -exec cp {} release-assets/ \;
          echo "Collected:"
          ls -la release-assets

      # The draft release itself was already created once, in create-release,
      # before this matrix started. Each leg just uploads its own assets to
      # that single release — no cross-job artifact passing (and no Actions
      # artifact storage cost) needed.
      - name: Publish release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release upload "$VERSION" release-assets/* \
            --repo "${{ github.repository }}" \
            --clobber
